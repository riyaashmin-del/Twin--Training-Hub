const registry=[],secEls=[],mainEl=document.getElementById('main'),tocEl=document.getElementById('toc'),chipEl=document.getElementById('chipBar');
DOC.forEach((sec,si)=>{
  const tr=document.createElement('div');tr.className='toc-row';tr.innerHTML=`<div class="toc-num">${si+1}</div><div class="toc-txt">${sec.title}</div>`;tr.onclick=()=>{stop();jumpTo(si);};tocEl.appendChild(tr);
  const ch=document.createElement('div');ch.className='chip';const ws=sec.title.split(' ');ch.textContent=ws.slice(0,4).join(' ')+(ws.length>4?'…':'');ch.onclick=()=>{stop();jumpTo(si);};chipEl.appendChild(ch);
  let block;
  if(sec.type==='hero'){
    block=document.createElement('div');block.className='hero';block.id='sec-'+si;block.innerHTML=`<div class="hero-eyebrow">${sec.eyebrow}</div>`;
    sec.items.forEach(it=>{const el=document.createElement(it.t==='sp'?'p':'div');el.className=it.t;el.dataset.si=si;el.dataset.spk=it.text;el.textContent=it.text;block.appendChild(el);});
  }else if(sec.type==='sec'){
    block=document.createElement('section');block.className='sec';block.id='sec-'+si;
    let h=`<div class="sec-hd"><div class="sec-icon ${sec.ic}">${sec.icon}</div><div><div class="sec-ey">${sec.eyebrow}</div><div class="sec-title">${sec.title}</div></div></div><div class="sec-body">`;
    let cDone=false,layDone=false,colDone=false,difDone=false;
    sec.items.forEach(it=>{
      if(it.t==='sp') h+=`<p class="sp" data-si="${si}">${it.text}</p>`;
      else if(it.t==='insight') h+=`<div class="insight" data-si="${si}">${it.text}</div>`;
      else if(it.t==='compare'&&!cDone){cDone=true;h+=`<div class="compare"><div class="cmp-col cmp-bad" data-si="${si}"><div class="cmp-lbl">${it.bad.label}</div><div class="cmp-items">${it.bad.items.map(x=>`• ${x}`).join('<br>')}</div></div><div class="cmp-col cmp-good" data-si="${si}"><div class="cmp-lbl">${it.good.label}</div><div class="cmp-items">${it.good.items.map(x=>`• ${x}`).join('<br>')}</div></div></div>`;}
      else if(it.t==='layers'&&!layDone){layDone=true;h+=`<div class="layer-grid">`;it.items.forEach(l=>{h+=`<div class="layer-card ${l.cls}" data-si="${si}"><div class="lay-num">${l.num}</div><div class="lay-head">${l.head}</div><div class="lay-body">${l.body}</div></div>`;});h+=`</div>`;}
      else if(it.t==='colours'&&!colDone){colDone=true;h+=`<div class="colour-grid">`;it.items.forEach(c=>{h+=`<div class="colour-card ${c.cls}" data-si="${si}"><div class="clbl">${c.lbl}</div><div class="ctxt">${c.txt}</div></div>`;});h+=`</div>`;}
      else if(it.t==='diffgrid'&&!difDone){difDone=true;h+=`<div class="diff-grid"><div class="diff-row diff-bad" data-si="${si}"><div class="diff-hd">${it.bad.head}</div><div class="diff-list">${it.bad.items.map(x=>`• ${x}`).join('<br>')}</div></div><div class="diff-row diff-good" data-si="${si}"><div class="diff-hd">${it.good.head}</div><div class="diff-list">${it.good.items.map(x=>`• ${x}`).join('<br>')}</div></div></div>`;}
    });
    h+=`</div>`;block.innerHTML=h;
  }else if(sec.type==='final'){
    block=document.createElement('section');block.className='sec';block.id='sec-'+si;
    let h=`<div class="sec-hd"><div class="sec-icon ${sec.ic}">${sec.icon}</div><div><div class="sec-ey">${sec.eyebrow}</div><div class="sec-title">${sec.title}</div></div></div><div class="sec-body"><div class="final-wrap">`;
    sec.items.forEach(it=>{h+=`<div class="${it.t}" data-si="${si}">${it.text}</div>`;if(it.t==='final-big')h+=`<div class="divider"></div>`;});
    h+=`</div></div>`;block.innerHTML=h;
  }
  if(si<DOC.length-1){const d=document.createElement('div');d.className='divider';block.appendChild(d);}
  mainEl.appendChild(block);secEls.push(block);
});
document.querySelectorAll('[data-si]').forEach(el=>{registry.push({el,si:+el.dataset.si});});
const voiceSel=document.getElementById('voiceSel');let voiceList=[];
function scoreVoice(v){let s=0;if(v.lang==='en-US')s+=40;else if(v.lang==='en-GB')s+=30;else if(v.lang==='en-AU')s+=20;else if(v.lang.startsWith('en'))s+=10;else return -1;const n=v.name.toLowerCase();if(n.includes('neural'))s+=30;if(n.includes('enhanced'))s+=25;if(n.includes('premium'))s+=25;if(n.includes('natural'))s+=20;if(n.includes('samantha'))s+=22;if(n.includes('ava'))s+=20;if(n.includes('allison'))s+=18;if(n.includes('victoria'))s+=16;if(n.includes('karen'))s+=16;if(n.includes('daniel'))s+=16;if(n.includes('moira'))s+=16;if(n.includes('zira'))s+=14;if(n.includes('susan'))s+=14;if(n.includes('alex'))s+=14;if(n.includes('compact'))s-=20;if(n.includes('espeak'))s-=30;if(n.includes('mbrola'))s-=30;return s;}
function populateVoices(){const raw=window.speechSynthesis.getVoices();if(!raw.length)return;const sc=raw.map(v=>({v,s:scoreVoice(v)})).filter(x=>x.s>=0).sort((a,b)=>b.s-a.s);if(!sc.length)return;voiceList=sc.map(x=>x.v);voiceSel.innerHTML='';voiceList.forEach((v,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${v.name} (${v.lang})`;voiceSel.appendChild(o);});voiceSel.value='0';}
populateVoices();if(window.speechSynthesis.onvoiceschanged!==undefined)window.speechSynthesis.onvoiceschanged=populateVoices;
function getVoice(){return voiceList[+voiceSel.value]||null;}
let cur=0,playing=false,idx=0,active=null;const synth=window.speechSynthesis,total=registry.length;
function hl(el,on){if(el)el.classList.toggle('hl',on);}function clearHl(){if(active){hl(active,false);active=null;}}
function activate(el,si){clearHl();hl(el,true);active=el;el.scrollIntoView({behavior:'smooth',block:'center'});if(si!==cur)cur=si;ui();}
function ui(){document.querySelectorAll('.toc-row').forEach((r,i)=>r.classList.toggle('active',i===cur));document.querySelectorAll('.chip').forEach((c,i)=>c.classList.toggle('active',i===cur));secEls.forEach((s,i)=>s.classList.toggle('dim',i!==cur));const pct=total>0?Math.round((idx/total)*100):0;document.getElementById('fillBar').style.width=pct+'%';document.getElementById('pctLbl').textContent=pct+'%';document.getElementById('secLbl').textContent=DOC[cur].title;document.getElementById('playBtn').innerHTML=playing?'&#9646;&#9646;':'&#9654;';const pill=document.getElementById('livePill');if(playing){pill.classList.add('on');document.getElementById('liveText').textContent=DOC[cur].title;}else pill.classList.remove('on');}
function jumpTo(si){cur=si;secEls[si].scrollIntoView({behavior:'smooth',block:'start'});const i=registry.findIndex(r=>r.si===si);if(i>=0)idx=i;ui();}
function getCleanText(el){return(el.dataset.spk||el.innerText||'').replace(/•/g,'').trim();}
function speakNext(){if(!playing)return;if(idx>=registry.length){playing=false;clearHl();ui();return;}const{el,si}=registry[idx++];activate(el,si);const text=getCleanText(el);if(!text){speakNext();return;}const u=new SpeechSynthesisUtterance(text);u.rate=+document.getElementById('spdSel').value;u.pitch=1.0;u.volume=1.0;const v=getVoice();if(v)u.voice=v;u.onend=()=>{if(playing)speakNext();};u.onerror=()=>{if(playing)speakNext();};synth.speak(u);}
function start(){synth.cancel();playing=true;ui();speakNext();}function stop(){playing=false;synth.cancel();clearHl();ui();}
document.getElementById('playBtn').onclick=()=>playing?stop():start();
document.getElementById('prevBtn').onclick=()=>{stop();jumpTo(Math.max(0,cur-1));};
document.getElementById('nextBtn').onclick=()=>{stop();jumpTo(Math.min(DOC.length-1,cur+1));};
document.getElementById('spdSel').onchange=()=>{if(playing){synth.cancel();setTimeout(()=>{if(playing)speakNext();},80);}};
document.getElementById('voiceSel').onchange=()=>{if(playing){synth.cancel();setTimeout(()=>{if(playing)speakNext();},80);}};
secEls.forEach((s,i)=>s.classList.toggle('dim',i!==0));document.querySelectorAll('.toc-row')[0].classList.add('active');document.querySelectorAll('.chip')[0].classList.add('active');ui();
const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting&&!playing){cur=+e.target.id.replace('sec-','');ui();}});},{threshold:0.3});secEls.forEach(el=>io.observe(el));
</script>
</body>
</html>
